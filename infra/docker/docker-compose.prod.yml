# Project4 - AA Stack Production Configuration
# Usage (from project4 root): docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d
#
# Production services: contract-deployer (one-time), bundler-alto, paymaster-api, valkey, dashboard
# No anvil dependency - connects directly to production blockchain

services:
  contract-deployer:
    image: docker.io/moliveira88/nokycgas-contract-deployer:latest
    build:
      context: ../..
      dockerfile: services/contract-deployer/Dockerfile
    environment:
      ANVIL_RPC: ${PRODUCTION_RPC_URL}
      VALKEY_URL: ${VALKEY_URL}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX}
      CONTRACT_DEPLOYER_PRODUCTION: "true"
      CONTRACT_DEPLOYER_SKIP_DEPLOYMENTS: ${CONTRACT_DEPLOYER_SKIP_DEPLOYMENTS}
      CONTRACT_DEPLOYER_DEPLOY_PROJECT4_PAYMASTER: ${CONTRACT_DEPLOYER_DEPLOY_PROJECT4_PAYMASTER}
      CONTRACT_DEPLOYER_DEPLOY_GAS_BURNER: ${CONTRACT_DEPLOYER_DEPLOY_GAS_BURNER:-false}
      CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE: ${CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE}
      PAYMASTER_CONTRACT_USDC_ADDRESS: ${PAYMASTER_CONTRACT_USDC_ADDRESS}
      PAYMASTER_CONTRACT_SIGNER_ADDRESS: ${PAYMASTER_CONTRACT_SIGNER_ADDRESS}
      CONTRACT_DEPLOYER_CONTRACTS_ARTIFACTS_PATH: ${CONTRACT_DEPLOYER_CONTRACTS_ARTIFACTS_PATH}
      CONTRACT_DEPLOYER_PRIVATE_KEY: ${CONTRACT_DEPLOYER_PRIVATE_KEY}
    volumes:
      - deploy-output:/deploy-output
    depends_on:
      valkey:
        condition: service_healthy
      config-bootstrap:
        condition: service_completed_successfully
    # Remove dependency on anvil - deployer can run immediately
    profiles:
      - deploy  # Only run when explicitly requested with --profile deploy

  bundler-alto:
    image: docker.io/moliveira88/nokycgas-bundler-alto:latest
    build:
      context: ../../services/bundler-alto
      dockerfile: Dockerfile
    ports:
      - "4337:4337"
    environment:
      VALKEY_URL: ${VALKEY_URL}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX}
      ALTO_RPC_URL: ${PRODUCTION_RPC_URL}
      RPC_URL: ${PRODUCTION_RPC_URL}
      PAYMASTER_CONTRACT_ENTRYPOINT_ADDRESS: ${PAYMASTER_CONTRACT_ENTRYPOINT_ADDRESS}
      ALTO_NETWORK_NAME: ${ALTO_NETWORK_NAME}
      ALTO_LOG_ENV: production
      ALTO_LOG_LEVEL: ${ALTO_LOG_LEVEL}
      ALTO_MIN_BALANCE: ${ALTO_MIN_BALANCE}
      ALTO_MAX_BLOCK_RANGE: ${ALTO_BLOCK_RANGE_LIMIT}
      ALTO_UTILITY_PRIVATE_KEY: ${ALTO_UTILITY_PRIVATE_KEY}
      ALTO_EXECUTOR_PRIVATE_KEYS: ${ALTO_EXECUTOR_PRIVATE_KEYS}
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
        required: false  # Allow bundler to start even if deployer hasn't run
      valkey:
        condition: service_healthy
      config-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4337/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  paymaster-api:
    image: docker.io/moliveira88/nokycgas-paymaster-api:latest
    build:
      context: ../..
      dockerfile: services/paymaster-api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - deploy-output:/deploy-output
    environment:
      PAYMASTER_API_RPC_URL: ${PRODUCTION_RPC_URL}
      PAYMASTER_API_BUNDLER_URL: ${PAYMASTER_API_BUNDLER_URL}
      VALKEY_URL: ${VALKEY_URL}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX}
      CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE: ${CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE}
      PAYMASTER_CONTRACT_SIGNER_PRIVATE_KEY: ${PAYMASTER_CONTRACT_SIGNER_PRIVATE_KEY}
      PAYMASTER_CONTRACT_ENTRYPOINT_ADDRESS: ${PAYMASTER_CONTRACT_ENTRYPOINT_ADDRESS}
      PAYMASTER_CONTRACT_VERIFICATION_GAS_LIMIT: ${PAYMASTER_CONTRACT_VERIFICATION_GAS_LIMIT}
      PAYMASTER_CONTRACT_POSTOP_GAS_LIMIT: ${PAYMASTER_CONTRACT_POSTOP_GAS_LIMIT}
      PAYMASTER_API_NORMAL_MAX_GAS_UNITS: ${PAYMASTER_API_NORMAL_MAX_GAS_UNITS:-800000}
      PAYMASTER_API_DEPLOY_MAX_GAS_UNITS: ${PAYMASTER_API_DEPLOY_MAX_GAS_UNITS:-3000000}
      PAYMASTER_API_VALIDITY_SECONDS: ${PAYMASTER_API_VALIDITY_SECONDS}
      PAYMASTER_API_MIN_POSTOP_FEE_USDC_E6: ${PAYMASTER_API_MIN_POSTOP_FEE_USDC_E6}
      PAYMASTER_API_PORT: ${PAYMASTER_API_PORT}
      PAYMASTER_API_ENTRYPOINT_ADDRESS: ${PAYMASTER_API_ENTRYPOINT_ADDRESS}
      PAYMASTER_API_SERVICE_FEE_BPS: ${PAYMASTER_API_SERVICE_FEE_BPS}
      PAYMASTER_REFILL_OWNER_PRIVATE_KEY: ${PAYMASTER_REFILL_OWNER_PRIVATE_KEY:-}
      ALTO_UTILITY_PRIVATE_KEY: ${ALTO_UTILITY_PRIVATE_KEY}
      ALTO_EXECUTOR_PRIVATE_KEYS: ${ALTO_EXECUTOR_PRIVATE_KEYS}
      PAYMASTER_API_REFILL_QUOTER_V2_ADDRESS: ${PAYMASTER_API_REFILL_QUOTER_V2_ADDRESS:-0x61fFE014bA17989E743c5F6cB21bF9697530B21e}
      PAYMASTER_API_REFILL_USDC_ADDRESS: ${PAYMASTER_API_REFILL_USDC_ADDRESS:-}
      PAYMASTER_API_REFILL_ROUTER_ADDRESS: ${PAYMASTER_API_REFILL_ROUTER_ADDRESS:-}
      PAYMASTER_API_REFILL_WRAPPED_NATIVE: ${PAYMASTER_API_REFILL_WRAPPED_NATIVE:-}
      PAYMASTER_API_REFILL_POOL_FEE_AUTO: ${PAYMASTER_API_REFILL_POOL_FEE_AUTO:-true}
      PAYMASTER_API_REFILL_POOL_FEE: ${PAYMASTER_API_REFILL_POOL_FEE:-500}
      PAYMASTER_API_REFILL_POOL_FEE_CACHE_MS: ${PAYMASTER_API_REFILL_POOL_FEE_CACHE_MS:-300000}
      PAYMASTER_API_REFILL_V3_FEE_CANDIDATES: ${PAYMASTER_API_REFILL_V3_FEE_CANDIDATES:-100,500,3000,10000}
      PAYMASTER_API_REFILL_SCHEDULE_DEBOUNCE_MS: ${PAYMASTER_API_REFILL_SCHEDULE_DEBOUNCE_MS:-15000}
      PAYMASTER_API_REFILL_TARGET_MULTIPLIER_ENTRYPOINT_BPS: ${PAYMASTER_API_REFILL_TARGET_MULTIPLIER_ENTRYPOINT_BPS:-20000}
      PAYMASTER_API_REFILL_TARGET_MULTIPLIER_PAYMASTER_NATIVE_BPS: ${PAYMASTER_API_REFILL_TARGET_MULTIPLIER_PAYMASTER_NATIVE_BPS:-10500}
      PAYMASTER_API_REFILL_TARGET_MULTIPLIER_UTILITY_BPS: ${PAYMASTER_API_REFILL_TARGET_MULTIPLIER_UTILITY_BPS:-15000}
      PAYMASTER_API_REFILL_TARGET_MULTIPLIER_EXECUTOR_BPS: ${PAYMASTER_API_REFILL_TARGET_MULTIPLIER_EXECUTOR_BPS:-15000}
      PAYMASTER_API_REFILL_SWAP_DEADLINE_SECONDS: ${PAYMASTER_API_REFILL_SWAP_DEADLINE_SECONDS:-300}
      PAYMASTER_API_REFILL_TRIGGER_SECRET: ${PAYMASTER_API_REFILL_TRIGGER_SECRET:-}
      PAYMASTER_API_DEBUG_LOGS: ${PAYMASTER_API_DEBUG_LOGS:-false}
    depends_on:
      bundler-alto:
        condition: service_healthy
      valkey:
        condition: service_healthy
      config-bootstrap:
        condition: service_completed_successfully

  valkey:  
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  config-bootstrap:
    image: docker.io/moliveira88/nokycgas-config-bootstrap:latest
    build:
      context: ../..
      dockerfile: services/config-bootstrap/Dockerfile
    env_file:
      - ../../.env.prod
    environment:
      VALKEY_URL: ${VALKEY_URL}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX}
      DASHBOARD_USEROPS_BLOCK_RANGE: ${DASHBOARD_USEROPS_BLOCK_RANGE:-50}      
      ANVIL_RPC: ${PRODUCTION_RPC_URL}
      PAYMASTER_API_RPC_URL: ${PRODUCTION_RPC_URL}
      ALTO_RPC_URL: ${PRODUCTION_RPC_URL}
      # Dashboard reads chain state via this URL (public RPC OK); paymaster/bundler use PRODUCTION_RPC_URL.
      DASHBOARD_RPC_URL: ${DASHBOARD_PUBLIC_RPC_URL:-https://polygon.publicnode.com}
      CONTRACT_DEPLOYER_DEPLOY_GAS_BURNER: ${CONTRACT_DEPLOYER_DEPLOY_GAS_BURNER:-false}
    depends_on:
      valkey:
        condition: service_healthy

  dashboard:
    image: docker.io/moliveira88/nokycgas-dashboard:latest
    build:
      context: ../..
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - deploy-output:/deploy-output
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/docker-compose:ro
    environment:
      DASHBOARD_RPC_URL: ${DASHBOARD_PUBLIC_RPC_URL:-https://polygon.publicnode.com}
      VALKEY_URL: ${VALKEY_URL}
      REDIS_URL: ${REDIS_URL}
      CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE: ${CONTRACT_DEPLOYER_PAYMASTER_ADDRESS_FILE}
      DASHBOARD_TREASURY_ADDRESS: ${DASHBOARD_TREASURY_ADDRESS:-}
      DASHBOARD_USDC_ADDRESS: ${DASHBOARD_USDC_ADDRESS}
      PAYMASTER_API_URL: ${PAYMASTER_API_URL}
      DASHBOARD_BUNDLER_URL: ${DASHBOARD_BUNDLER_URL}
      DASHBOARD_ENTRYPOINT_ADDRESS: ${DASHBOARD_ENTRYPOINT_ADDRESS}
      DASHBOARD_REFILL_OWNER_KEY: ${PAYMASTER_REFILL_OWNER_PRIVATE_KEY:-}
      DASHBOARD_ALTO_UTILITY_KEY: ${DASHBOARD_ALTO_UTILITY_KEY}
      DASHBOARD_ALTO_EXECUTOR_KEYS: ${DASHBOARD_ALTO_EXECUTOR_KEYS}
      ALTO_UTILITY_PRIVATE_KEY: ${ALTO_UTILITY_PRIVATE_KEY}
      ALTO_EXECUTOR_PRIVATE_KEYS: ${ALTO_EXECUTOR_PRIVATE_KEYS}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS}
      MIN_ENTRYPOINT_DEPOSIT_WEI: ${MIN_ENTRYPOINT_DEPOSIT_WEI}
      CAP_ENTRYPOINT_BALANCE_WEI: ${CAP_ENTRYPOINT_BALANCE_WEI}
      DASHBOARD_REFILL_SWAP_USDC_E6: ${DASHBOARD_REFILL_SWAP_USDC_E6:-${DASHBOARD_WORKER_SWAP_USDC_E6}}
      REFILL_SWAP_USDC_E6: ${REFILL_SWAP_USDC_E6:-${WORKER_SWAP_USDC_E6}}
      DASHBOARD_MIN_PAYMASTER_NATIVE_WATCH_WEI: ${DASHBOARD_MIN_PAYMASTER_NATIVE_WATCH_WEI:-${DASHBOARD_MIN_WORKER_DEPOSIT_WEI}}
      MIN_PAYMASTER_NATIVE_WATCH_WEI: ${MIN_PAYMASTER_NATIVE_WATCH_WEI:-${MIN_WORKER_DEPOSIT_WEI}}
      DASHBOARD_CAP_PAYMASTER_NATIVE_WATCH_WEI: ${DASHBOARD_CAP_PAYMASTER_NATIVE_WATCH_WEI:-${DASHBOARD_CAP_WORKER_BALANCE_WEI}}
      CAP_PAYMASTER_NATIVE_WATCH_WEI: ${CAP_PAYMASTER_NATIVE_WATCH_WEI:-${CAP_WORKER_BALANCE_WEI}}
      DASHBOARD_WORKER_SWAP_USDC_E6: ${DASHBOARD_WORKER_SWAP_USDC_E6:-}
      WORKER_SWAP_USDC_E6: ${WORKER_SWAP_USDC_E6:-}
      DASHBOARD_MIN_WORKER_DEPOSIT_WEI: ${DASHBOARD_MIN_WORKER_DEPOSIT_WEI:-}
      MIN_WORKER_DEPOSIT_WEI: ${MIN_WORKER_DEPOSIT_WEI:-}
      DASHBOARD_CAP_WORKER_BALANCE_WEI: ${DASHBOARD_CAP_WORKER_BALANCE_WEI:-}
      CAP_WORKER_BALANCE_WEI: ${CAP_WORKER_BALANCE_WEI:-}
      DASHBOARD_USEROPS_BLOCK_RANGE: ${DASHBOARD_USEROPS_BLOCK_RANGE:-1024}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX}
      DASHBOARD_DOCKER_ENABLED: ${DASHBOARD_DOCKER_ENABLED:-true}
      DASHBOARD_DOCKER_COMPOSE_FILE: ${DASHBOARD_DOCKER_COMPOSE_FILE:-/docker-compose/docker-compose.prod.yml}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-}
      DASHBOARD_PAYMASTER_HEALTH_URL: ${DASHBOARD_PAYMASTER_HEALTH_URL:-http://paymaster-api:3000/health}
      DASHBOARD_DOCKER_SERVICE_NAME: ${DASHBOARD_DOCKER_SERVICE_NAME:-paymaster-api}
      PAYMASTER_API_REFILL_TRIGGER_SECRET: ${PAYMASTER_API_REFILL_TRIGGER_SECRET:-}
      DASHBOARD_ADMIN_PASSWORD_HASH: ${DASHBOARD_ADMIN_PASSWORD_HASH:-}
    depends_on:
      valkey:
        condition: service_healthy
      config-bootstrap:
        condition: service_completed_successfully

volumes:
  deploy-output: {}
  valkey-data: {}